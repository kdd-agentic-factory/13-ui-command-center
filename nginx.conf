server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────────────────────────
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"ui-command-center","version":"0.1.0"}';
    }

    # ── Backend proxy (nginx resolves Docker service DNS at build time) ───────
    location /api/governance/ {
        proxy_pass http://governance-policy-service:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/orchestrator/ {
        proxy_pass http://agent-orchestrator:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/skills/ {
        proxy_pass http://skills-autoskills-registry:8030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/workflows/ {
        proxy_pass http://workflow-registry-service:8070/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/experiments/ {
        proxy_pass http://experimentation-lab:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/mcp/ {
        proxy_pass http://mcp-gateway:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── SPA routing — all other paths serve index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
