server {
    listen 3000;
    # Relative redirects — the absolute form leaks the internal port 3000 and
    # http scheme behind Fly/Docker, making `/` → /pit-wall-os/ unreachable.
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────────────────────────
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"ui-command-center","version":"0.1.0"}';
    }

    # ── Backend proxy (nginx resolves Docker service DNS at build time) ───────
    location /api/governance/ {
        proxy_pass http://governance-policy-service:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/orchestrator/ {
        proxy_pass http://agent-orchestrator:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/skills/ {
        proxy_pass http://skills-autoskills-registry:8030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/workflows/ {
        proxy_pass http://workflow-registry-service:8070/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/experiments/ {
        proxy_pass http://experimentation-lab:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/telemetry/ {
        proxy_pass http://telemetry-dataset-service:8180/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/twin/ {
        proxy_pass http://digital-twin:8170/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/rag/ {
        proxy_pass http://rag-cag-knowledge-layer:8020/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/pipelines/ {
        proxy_pass http://kdd-data-pipelines:8060/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/security/ {
        proxy_pass http://security-policy-service:8130/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /api/mcp/ {
        proxy_pass http://mcp-gateway:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── Pit-Wall OS — immersive HUD landing (static files) ───────────────────
    location /pit-wall-os/ {
        alias /usr/share/nginx/html/pit-wall-os/;
        index index.html;
        try_files $uri $uri/ /pit-wall-os/index.html;
    }

    # ── React SPA — command center dashboard ─────────────────────────────────
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Root serves the React SPA public surface
    # ── Fallback SPA routing ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
