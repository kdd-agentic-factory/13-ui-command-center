name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    uses: kdd-agentic-race-engineering/12-ci-cd-security/.github/workflows/reusable-docker-build.yml@main
    with:
      image-name: ui-command-center
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}
